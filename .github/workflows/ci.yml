name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore GitShare.sln
      - name: Build
        run: dotnet build GitShare.sln -c Release --no-restore
      - name: Test
        run: dotnet test tests/GitShare.Api.Tests/GitShare.Api.Tests.csproj -c Release --no-build

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/GitShare.Client/package-lock.json
      - name: Install
        working-directory: src/GitShare.Client
        run: npm ci
      - name: Build
        working-directory: src/GitShare.Client
        env:
          VITE_API_URL: https://api.example.com
        run: npm run build
